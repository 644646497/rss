name: NYT
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install trafilatura feedparser feedgenerator requests

      - name: Run
        run: python nytimes.py

      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add feed.xml
          git commit -m "update" || true
          git push --force

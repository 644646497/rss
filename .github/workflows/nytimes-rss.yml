name: NYT 中文全文 RSS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'   # 每2小时更新一次（NYT 更新不算太频繁）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install trafilatura feedgenerator requests feedparser

      - name: Generate Full-text RSS
        run: python nytimes_fulltext_rss.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add feed.xml
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "Update NYT 中文全文 RSS $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
